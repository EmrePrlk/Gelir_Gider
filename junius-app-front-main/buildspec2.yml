version: 0.2

phases:
  install:
    commands:
      - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
      - timeout 15 sh -c "until docker info; do echo .; sleep 1; done"
  pre_build:
    commands:
      - echo Build started on `date`
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 471112771661.dkr.ecr.eu-central-1.amazonaws.com
  build:
    commands:
      - echo Building Docker image...
      - docker image build --memory=32g --memory-swap=32g -f Dockerfile -t juniusapp/front-end:latest .
      - docker image tag juniusapp/front-end:latest 471112771661.dkr.ecr.eu-central-1.amazonaws.com/juniusappfront2:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing Docker image...
      - docker image push 471112771661.dkr.ecr.eu-central-1.amazonaws.com/juniusappfront2:latest
      - echo Pushed image to ECR
artifacts:
  files:
    - "**/*"
