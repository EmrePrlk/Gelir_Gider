name: Restrict PRs to Main

on:
  pull_request:
    branches:
      - main

jobs:
  restrict-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR author and labels
        id: check
        run: |
          if [[ "${{ github.event.pull_request.user.login }}" != "your-username" ]]; then
            echo "PR from unauthorized user. Cancelling."
            exit 1
          fi
