version: 0.2

phases:
  pre_build:
    commands:
      - echo Build started on `date`
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 471112771661.dkr.ecr.eu-central-1.amazonaws.com
      
  build:
    commands:
      - echo Building Docker image...
      - docker image build -f Dockerfile -t juniusapp/back-end:latest .
      - docker image tag juniusapp/back-end:latest 471112771661.dkr.ecr.eu-central-1.amazonaws.com/juniusappback2:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing Docker image...
      - docker image push 471112771661.dkr.ecr.eu-central-1.amazonaws.com/juniusappback2:latest
      - echo Pushed image to ECR

artifacts:
  files:
    - '**/*'