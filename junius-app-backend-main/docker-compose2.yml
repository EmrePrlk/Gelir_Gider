version: '3.9'

services:
  # frontend:       ## next.js uygulamasi
  #   image: 471112771661.dkr.ecr.eu-central-1.amazonaws.com/juniusappfront:latest
  #   pull_policy: always
  #   container_name: frontend
  #   volumes:
  #     - .frontend:/bun/app
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - ../junius-app-front/.env




  backend:      ##   python
    image: 471112771661.dkr.ecr.eu-central-1.amazonaws.com/juniusappback2:latest
    pull_policy: always
    container_name: backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - /home/ubuntu/junius-app-backend-prod/.env

  nginx:
    container_name: nginx
    #build: ./nginx
    image: junibacknginxprod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:

      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /home/ubuntu/backend/certbot/conf:/etc/letsencrypt
      - /home/ubuntu/backend/certbot/www:/var/www/certbot
    # depends_on:
    #   - certbot
    #command: /bin/sh -c "while [ ! -f /etc/letsencrypt/live/walkedu4.toptas.live/fullchain.pem ]; do sleep 1; done && nginx -g 'daemon off;'"

  certbot:
    #build: ./certbot
    container_name: certbot
    image: certbot/certbot
    volumes:
      - /home/ubuntu/backend/certbot/conf:/etc/letsencrypt
      - /home/ubuntu/backend/certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --force-renewal --email toptascagri@gmail.com -d prod.juniusapp.io --agree-tos
